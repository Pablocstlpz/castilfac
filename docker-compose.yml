version: '3.8'

# Todas las variables vienen del .env del stack (Portainer: "Environment variables"
# o importar .env). Docker Compose sustituye ${NOMBRE} al desplegar.

services:
  mariadb:
    image: mariadb:10.11
    container_name: castilfac_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
    volumes:
      - castilfac_data:/var/lib/mysql
      - /DATA:/DATA

  backend:
    build: ./backend
    container_name: castilfac_api
    restart: always
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_HOST: mariadb
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      URL: ${URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SECRET_KEY: ${SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - mariadb

  frontend:
    build: ./frontend
    container_name: castilfac_web
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  castilfac_data:
