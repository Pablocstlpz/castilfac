<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-4 font-sans relative overflow-hidden">
  
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-600/5 rounded-full blur-3xl"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-indigo-600/5 h-96 rounded-full blur-3xl"></div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-10 text-center relative z-10 animate-in zoom-in-95 duration-500">
    
    <div class="w-24 h-24 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 relative">
      <div class="absolute inset-0 border-4 border-emerald-100 rounded-full animate-ping opacity-25"></div>
      <mat-icon class="text-[56px] w-[56px] h-[56px]">check_circle</mat-icon>
    </div>

    <h1 class="text-2xl font-black text-slate-900 mb-3 tracking-tight">
      {{ 'resetPassword.allDoneTitle' | translate }}
    </h1>
    
    <p class="text-sm text-slate-500 mb-8 leading-relaxed">
      {{ 'resetPassword.allDoneMsg' | translate }}
    </p>

    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-8 flex items-center gap-4 text-left">
      <div class="bg-white p-2 rounded-lg shadow-sm">
        <mat-icon class="text-slate-400 text-[20px] w-[20px] h-[20px]">shield</mat-icon>
      </div>
      <div>
        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">{{ 'resetPassword.accountStatus' | translate }}</p>
        <p class="text-xs font-bold text-slate-700">{{ 'resetPassword.accountProtected' | translate }}</p>
      </div>
    </div>

    <button 
      (click)="irAlLogin()" 
      class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-900/20 hover:bg-slate-800 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
    >
      {{ 'resetPassword.loginNow' | translate }}
      <mat-icon class="text-[18px]">login</mat-icon>
    </button>

    <p class="mt-10 text-[10px] text-slate-400 font-medium">
      {{ 'resetPassword.redirecting' | translate }}
    </p>

  </div>
</div>
