<aside
  class="fixed md:sticky top-0 left-0 z-30 flex h-screen w-[86vw] max-w-sm md:w-64 -translate-x-full md:translate-x-0 flex-col bg-slate-900 text-white shadow-2xl transition-transform duration-300 ease-in-out md:flex"
  [class.translate-x-0]="menuMovilAbierto"
>
  <div class="h-16 flex items-center px-6 border-b border-slate-700 bg-slate-950">
    <mat-icon class="text-blue-500 mr-2">business</mat-icon>
    <span class="flex-1 text-lg font-bold tracking-wider">CASTILFAC</span>
    <button
      type="button"
      class="md:hidden rounded-lg p-2 text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
      (click)="cerrarMenuMovil()"
      aria-label="Cerrar menú"
    >
      <mat-icon class="text-[22px]">close</mat-icon>
    </button>
  </div>

  <div class="p-6 border-b border-slate-800">
    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Conectado como</p>
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold shadow-md"
      >
        AD
      </div>
      <div>
        <p class="font-bold text-sm">Administrador</p>
        <p class="text-xs text-emerald-400 flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Gerencia
        </p>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 px-2">Principal</p>

    <a
      routerLink="/inicioadmin"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>dashboard</mat-icon>
      <span class="font-medium text-sm">Panel de Control</span>
    </a>

    <a
      routerLink="/inicioadmin/pedidos"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>request_quote</mat-icon>
      <span class="font-medium text-sm">Pedidos</span>
    </a>

    <a
      routerLink="/inicioadmin/catalogo-y-precios"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>category</mat-icon>
      <span class="font-medium text-sm">Catalogo y Precios</span>
    </a>

    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">
      Administracion
    </p>

    <a
      routerLink="/inicioadmin/gestion-personal"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>groups</mat-icon>
      <span class="font-medium text-sm">Gestion de Personal</span>
    </a>

    <a
      routerLink="/inicioadmin/clientes"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>person</mat-icon>
      <span class="font-medium text-sm">Clientes</span>
    </a>

    <a
      routerLink="/inicioadmin/presupuestos"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>description</mat-icon>
      <span class="font-medium text-sm">Presupuestos</span>
    </a>

    <a
      routerLink="/inicioadmin/finanzas"
      routerLinkActive="!bg-blue-600 !text-white shadow-md"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
      (click)="cerrarMenuMovil()"
    >
      <mat-icon>account_balance</mat-icon>
      <span class="font-medium text-sm">Finanzas</span>
    </a>
  </nav>
</aside>
