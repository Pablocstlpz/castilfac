<div class="h-full overflow-y-auto p-4 sm:p-6 bg-slate-50 font-sans">
  <form [formGroup]="clienteForm" (ngSubmit)="onSubmit()" class="bg-white p-5 sm:p-7 rounded-2xl shadow-sm border border-slate-200">
    <div class="mb-5">
      <h3
        class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 flex items-center gap-2"
      >
        <mat-icon class="text-indigo-500 text-sm">person</mat-icon>
        Datos Principales
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Nombre de Empresa o Particular *</label
          >
          <div class="relative">
            <mat-icon class="absolute left-3 top-2.5 text-slate-400">badge</mat-icon>
            <input
              type="text"
              formControlName="nombre_empresa_o_particular"
              placeholder="Ej: Construcciones Garcia SL"
              class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
              [class.border-red-400]="false"
            />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >NIF / CIF</label
          >
          <input
            type="text"
            formControlName="nif_cif"
            placeholder="Ej: B12345678"
            class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all uppercase"
          />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Telefono</label
          >
          <div class="relative">
            <mat-icon class="absolute left-3 top-2.5 text-slate-400">phone</mat-icon>
            <input
              type="tel"
              formControlName="telefono"
              placeholder="+34 600 000 000"
              class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
            />
          </div>
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Correo Electronico</label
          >
          <div class="relative">
            <mat-icon class="absolute left-3 top-2.5 text-slate-400">mail</mat-icon>
            <input
              type="email"
              formControlName="email"
              placeholder="info@empresa.com"
              class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="mb-5">
      <h3
        class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 flex items-center gap-2"
      >
        <mat-icon class="text-indigo-500 text-sm">local_offer</mat-icon>
        Condiciones Comerciales
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Tipo de Cliente *</label
          >
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo_cliente" value="particular" class="peer sr-only" />
              <div
                class="text-center px-2 py-2 rounded-lg border border-slate-200 bg-slate-50 text-xs font-bold text-slate-500 transition-all peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-slate-100"
              >
                Particular
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo_cliente" value="empresa" class="peer sr-only" />
              <div
                class="text-center px-2 py-2 rounded-lg border border-slate-200 bg-slate-50 text-xs font-bold text-slate-500 transition-all peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 hover:bg-slate-100"
              >
                Empresa
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo_cliente" value="vip" class="peer sr-only" />
              <div
                class="text-center px-2 py-2 rounded-lg border border-slate-200 bg-slate-50 text-xs font-bold text-slate-500 transition-all peer-checked:bg-amber-50 peer-checked:border-amber-500 peer-checked:text-amber-700 hover:bg-slate-100"
              >
                VIP
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="tipo_cliente" value="mayorista" class="peer sr-only" />
              <div
                class="text-center px-2 py-2 rounded-lg border border-slate-200 bg-slate-50 text-xs font-bold text-slate-500 transition-all peer-checked:bg-purple-50 peer-checked:border-purple-500 peer-checked:text-purple-700 hover:bg-slate-100"
              >
                Mayorista
              </div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Descuento Base</label
          >
          <div class="relative">
            <input
              type="number"
              step="0.01"
              formControlName="descuento_fijo"
              placeholder="0.00"
              class="w-full pl-4 pr-10 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 font-bold focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-right"
            />
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
              <span class="text-slate-500 font-bold">%</span>
            </div>
          </div>
          <p class="text-[10px] text-slate-400 mt-1">Se aplicara a sus presupuestos.</p>
        </div>
      </div>
    </div>

    <div class="mb-5">
      <h3
        class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 flex items-center gap-2"
      >
        <mat-icon class="text-indigo-500 text-sm">location_on</mat-icon>
        Ubicacion
      </h3>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
          >Direccion Fiscal / Facturacion</label
        >
        <textarea
          formControlName="direccion"
          rows="2"
          placeholder="Calle, Numero, Codigo Postal, Ciudad..."
          class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"
        ></textarea>
      </div>
    </div>

    <div class="pt-5 border-t border-slate-200 flex flex-col-reverse sm:flex-row justify-end gap-3">
      <button
        type="button"
        (click)="cancelar()"
        class="px-6 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-600 font-bold text-sm hover:bg-slate-50 transition-colors"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-md shadow-indigo-200 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <mat-icon class="text-[18px]">save</mat-icon>
        Guardar Cliente
      </button>
    </div>
  </form>
</div>
