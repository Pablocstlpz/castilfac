<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-4 font-sans relative overflow-hidden">
  
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/5 rounded-full blur-3xl"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600/5 rounded-full blur-3xl"></div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 text-center relative z-10 animate-in zoom-in-95 duration-300">
    
    <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-indigo-100">
      <mat-icon class="text-[40px] w-[40px] h-[40px]">mark_email_unread</mat-icon>
    </div>

    <h1 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">{{ 'register.confirmTitle' | translate }}</h1>
    <p class="text-sm text-slate-500 mb-2 leading-relaxed">
      {{ 'register.confirmSubtitle' | translate }}
    </p>
    @if (emailEmpresa()) {
      <p class="text-sm font-bold text-indigo-600 mb-6">{{ emailEmpresa() }}</p>
    }

    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 mb-8 text-left">
      <div class="flex items-start gap-3">
        <mat-icon class="text-indigo-600 mt-0.5 text-[20px] w-[20px] h-[20px]">info</mat-icon>
        <div>
          <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-1">{{ 'register.actionRequired' | translate }}</h3>
          <p class="text-[13px] text-slate-600 leading-relaxed m-0">
            {{ 'register.confirmInstructions' | translate }}
          </p>
        </div>
      </div>
    </div>

    <button (click)="abrirCorreo()" class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all flex items-center justify-center gap-2 mb-6">
      {{ 'register.openEmail' | translate }}
      <mat-icon class="text-[18px]">open_in_new</mat-icon>
    </button>

    <p class="text-xs text-slate-400">
      {{ 'register.notReceived' | translate }}
      <button
        (click)="reenviarVerificacion()"
        [disabled]="cargando()"
        class="font-bold text-indigo-600 hover:text-indigo-800 transition-colors underline decoration-2 underline-offset-2 ml-1 disabled:opacity-50 disabled:cursor-not-allowed">
        {{ cargando() ? ('register.sending' | translate) : ('register.resendActivation' | translate) }}
      </button>
    </p>

    <div class="mt-8 pt-6 border-t border-slate-100">
      <button (click)="volverAlLogin()" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors flex items-center justify-center gap-2 w-full">
        <mat-icon class="text-[18px]">arrow_back</mat-icon> {{ 'common.backLogin' | translate }}
      </button>
    </div>

  </div>
</div>
