<div class="min-h-screen bg-slate-50 flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8 font-sans">
  
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 sm:p-10 text-center">
      
      <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-yellow-50 border-4 border-yellow-100 mb-6">
        <svg class="h-12 w-12 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
      </div>
  
      <h2 class="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">
        {{ 'auth.loginSuccessTitle' | translate }}
      </h2>
      
      <p class="text-slate-600 mb-6 leading-relaxed">
        {{ 'auth.loginSuccessMsg' | translate }}
      </p>
  
      <div class="bg-yellow-50 rounded-lg p-4 mb-8 text-sm text-yellow-800 border border-yellow-200 text-left">
        <div class="flex items-center gap-2 mb-2">
          <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          <span class="font-semibold">{{ 'auth.comingSoon' | translate }}</span>
        </div>
        <p class="ml-7 text-yellow-700">
          {{ 'auth.comingSoonMsg' | translate }}
        </p>
      </div>
  
      <div class="space-y-3">
        <a routerLink="/login" 
           class="inline-block w-full bg-white hover:bg-slate-50 text-slate-600 font-medium py-3 px-4 rounded-lg border border-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
          {{ 'auth.logoutAndBack' | translate }}
        </a>
      </div>
  
    </div>
  </div>
