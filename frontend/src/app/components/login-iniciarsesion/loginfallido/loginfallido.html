<div class="min-h-screen bg-slate-50 flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8 font-sans">
  
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 sm:p-10 text-center">
      
      <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-red-50 border-4 border-red-100 mb-6">
        <svg class="h-12 w-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
  
      <h2 class="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">
        {{ 'auth.loginFailedTitle' | translate }}
      </h2>
      
      <p class="text-slate-600 mb-8 leading-relaxed">
        {{ 'auth.loginFailedMsg' | translate }}
      </p>
  
      <div class="space-y-3">
        <a href="/login" 
           class="inline-block w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
          {{ 'auth.tryAgain' | translate }}
        </a>
        
        <a href="/" 
           class="inline-block w-full bg-white hover:bg-slate-50 text-slate-600 font-medium py-3 px-4 rounded-lg border border-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
          {{ 'common.backHome' | translate }}
        </a>
      </div>
  
    </div>
  </div>
