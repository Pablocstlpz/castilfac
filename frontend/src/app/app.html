<div [class]="esRutaProtegida() ? 'h-screen overflow-hidden' : 'min-h-screen flex flex-col'">
  @if (!esRutaProtegida()) {
    <app-head />
  }
  <main [class]="esRutaProtegida() ? 'h-full overflow-hidden' : 'flex-1'">
    <router-outlet />
  </main>
  @if (!esRutaProtegida()) {
    <app-footer />
  }
</div>
